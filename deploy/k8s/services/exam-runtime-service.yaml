apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-runtime-service
  namespace: exam-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: exam-runtime-service
  template:
    metadata:
      labels:
        app: exam-runtime-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8086"
    spec:
      containers:
        - name: exam-runtime-service
          image: exam/exam-runtime-service:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: exam-config
          env:
            - name: DS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: DB_USERNAME
            - name: DS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: exam-runtime-service
  namespace: exam-system
spec:
  type: ClusterIP
  selector:
    app: exam-runtime-service
  ports:
    - port: 8086
      targetPort: 8086
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: exam-runtime-service
  namespace: exam-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: exam-runtime-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: exam-runtime-service-pdb
  namespace: exam-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: exam-runtime-service
