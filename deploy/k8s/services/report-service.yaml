apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: exam-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
    spec:
      containers:
        - name: report-service
          image: exam/report-service:latest
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: exam-config
            - secretRef:
                name: exam-secrets
          env:
            - name: DS_URL
              value: jdbc:postgresql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)
            - name: DS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: DB_USERNAME
            - name: DS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: report-service
  namespace: exam-system
spec:
  type: ClusterIP
  selector:
    app: report-service
  ports:
    - port: 8087
      targetPort: 8087
