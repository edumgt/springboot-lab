apiVersion: apps/v1
kind: Deployment
metadata:
  name: subject-service
  namespace: exam-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: subject-service
  template:
    metadata:
      labels:
        app: subject-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8083"
    spec:
      containers:
        - name: subject-service
          image: exam/subject-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: exam-config
          env:
            - name: DS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: DB_USERNAME
            - name: DS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: subject-service
  namespace: exam-system
spec:
  type: ClusterIP
  selector:
    app: subject-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: subject-service
  namespace: exam-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: subject-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
