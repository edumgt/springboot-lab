services:
  postgres:
    image: postgres:14
    container_name: exam2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: exam2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exam2"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
