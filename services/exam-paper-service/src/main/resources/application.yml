server:
  port: 8085
  shutdown: graceful

spring:
  application:
    name: exam-paper-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${DS_URL:jdbc:postgresql://localhost:5432/exam2}
    username: ${DS_USERNAME:postgres}
    password: ${DS_PASSWORD:123456}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

services:
  question:
    url: ${QUESTION_SERVICE_URL:http://localhost:8084}
  subject:
    url: ${SUBJECT_SERVICE_URL:http://localhost:8083}

mybatis:
  mapper-locations: classpath:/mapper/*.xml

pagehelper:
  helperDialect: postgresql
  reasonable: true
  supportMethodsArguments: true

resilience4j:
  circuitbreaker:
    instances:
      question-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      subject-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

jwt:
  secret: ${JWT_SECRET:exam-jwt-secret-key-must-be-at-least-32-chars}
