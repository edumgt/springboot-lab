server:
  port: 8086
  shutdown: graceful

spring:
  application:
    name: exam-runtime-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${DS_URL:jdbc:postgresql://localhost:5432/exam2}
    username: ${DS_USERNAME:postgres}
    password: ${DS_PASSWORD:123456}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

services:
  exam-paper:
    url: ${EXAM_PAPER_SERVICE_URL:http://localhost:8085}

mybatis:
  mapper-locations: classpath:/mapper/*.xml

pagehelper:
  helperDialect: postgresql
  reasonable: true
  supportMethodsArguments: true

resilience4j:
  circuitbreaker:
    instances:
      exam-paper-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

jwt:
  secret: ${JWT_SECRET:exam-jwt-secret-key-must-be-at-least-32-chars}
